name: Container Workflow
on: workflow_dispatch

env:
  ACR_LOGIN_SERVICE: aistrainingacr.azurecr.io
  TAG_NAME: eshopping

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: ACR Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVICE }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image2
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVICE }}/eshoponweb:${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVICE }}/eshoponweb:${{ env.TAG_NAME }}