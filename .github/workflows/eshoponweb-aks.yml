name: Container Workflow
on: workflow_dispatch

env:
  ACR_LOGIN_SERVICE: aistraining.azurecr.io
  TAG_NAME: eshopping:1.0.0
  IMAGE_NAME: aistraining.azurecr.io/eshopping:1.0.0
  RESOURCE_GROUP: rg-022
  CLUSTER_NAME: aks-demo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: ACR Login
        uses: azure/docker-login@v1
        with:
          login-vserver: ${{ env.ACR_LOGIN_SERVICE }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image2
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVICE }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVICE }}/${{ env.TAG_NAME }}

  deploy-to-aks:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set context for AKS
        run: az aks get-credentials --resource-group <RESOURCE_GROUP> --name <AKS_CLUSTER_NAME>

      - name: Deploy to AKS
        run: |
          kubectl apply -f .k8s/deployment.yaml